name: "Installation Test"

permissions:
  contents: "read"

on:
  pull_request:
    paths:
      - "pyproject.toml"
  workflow_dispatch:

env:
  DO_NOT_TRACK: "1"

jobs:
  install-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Recommended versions: Python 3.12, PyTorch 2.8.0
        include:
          # Test all Python versions with recommended PyTorch
          - python-version: "3.10"
            torch-version: "2.8.0"
          - python-version: "3.11"
            torch-version: "2.8.0"
          - python-version: "3.12"
            torch-version: "2.8.0"
          - python-version: "3.13"
            torch-version: "2.8.0"
          - python-version: "3.14"
            torch-version: "2.9.0" # Python 3.14 requires PyTorch 2.9
          # Test all PyTorch versions with recommended Python
          - python-version: "3.12"
            torch-version: "2.6.0"
          - python-version: "3.12"
            torch-version: "2.7.1"
          - python-version: "3.12"
            torch-version: "2.9.0"

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Cache HuggingFace Models
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/huggingface
          key: hf-models-${{ runner.os }}
          restore-keys: |
            hf-models-${{ runner.os }}-

      - name: Install oumi
        run: |
          uv pip install --system -e .

      - name: Override PyTorch ${{ matrix.torch-version }}
        run: |
          uv pip install --system torch==${{ matrix.torch-version }} torchvision torchaudio

      - name: Verify installation
        run: |
          python -c "import torch; print(f'PyTorch version: {torch.__version__}')"
          oumi env

      - name: Install pytest
        run: |
          uv pip install --system pytest-asyncio>=1.1.0 pytest-cov pytest-timeout pytest responses
          uv pip install --system pdftext  # temporary fix to unblock the tests

      - name: Run tests
        run: |
          cd ./tests/unit/
          pytest -q -s -m "not e2e and not e2e_eternal and not single_gpu and not multi_gpu" --durations=50 --timeout=300
