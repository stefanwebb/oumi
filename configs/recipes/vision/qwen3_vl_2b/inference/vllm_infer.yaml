# Qwen3-VL 2B Instruct vLLM inference config.
#
# Requirements:
#   - Run `pip install oumi[gpu]`
#
# Usage:
#   oumi infer -i -c configs/recipes/vision/qwen3_vl_2b/inference/vllm_infer.yaml \
#     --image "tests/testdata/images/the_great_wave_off_kanagawa.jpg"
#
# To use a fine-tuned model, override model_name:
#   oumi infer -i -c configs/recipes/vision/qwen3_vl_2b/inference/vllm_infer.yaml \
#     --model.model_name output/qwen3_vl_2b_fft \
#     --image "tests/testdata/images/the_great_wave_off_kanagawa.jpg"
#
# See Also:
#   - Documentation: https://oumi.ai/docs/en/latest/user_guides/infer/infer.html
#   - Config class: oumi.core.configs.InferenceConfig
#   - Config source: https://github.com/oumi-ai/oumi/blob/main/src/oumi/core/configs/inference_config.py
#   - Other inference configs: configs/**/inference/

model:
  model_name: "Qwen/Qwen3-VL-2B-Instruct"
  torch_dtype_str: "bfloat16"
  model_max_length: 4096
  chat_template: "qwen3-vl-instruct"
  trust_remote_code: True

generation:
  max_new_tokens: 64

engine: VLLM
