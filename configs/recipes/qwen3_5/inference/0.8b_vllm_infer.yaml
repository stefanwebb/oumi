# vLLM Inference config for Qwen3.5 0.8B.
#
# Requirements:
#   - Run `pip install oumi[gpu]`
#
# Usage:
#   oumi infer -i -c configs/recipes/qwen3_5/inference/0.8b_vllm_infer.yaml
#
# To use a fine-tuned model, override model_name:
#   oumi infer -i -c configs/recipes/qwen3_5/inference/0.8b_vllm_infer.yaml \
#     --model.model_name output/qwen3.5_0.8b.fft
#
# See Also:
#   - Documentation: https://oumi.ai/docs/en/latest/user_guides/infer/infer.html
#   - Config class: oumi.core.configs.InferenceConfig
#   - Config source: https://github.com/oumi-ai/oumi/blob/main/src/oumi/core/configs/inference_config.py
#   - Other inference configs: configs/**/inference/

model:
  model_name: "Qwen/Qwen3.5-0.8B"
  model_max_length: 32768
  torch_dtype_str: "bfloat16"
  attn_implementation: "sdpa"
  trust_remote_code: True

generation:
  max_new_tokens: 512
  temperature: 0.6
  top_p: 0.95
  use_sampling: True

engine: VLLM
